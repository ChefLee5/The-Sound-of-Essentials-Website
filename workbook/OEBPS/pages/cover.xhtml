<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:epub="http://www.idpf.org/2007/ops"
      lang="en" xml:lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>SOE Rhythm Quest: The Summer Stretch Workbook</title>
  <link rel="stylesheet" type="text/css" href="../styles/workbook.css"/>
  <style>
    .cover-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 90vh;
      text-align: center;
      background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border-radius: 1.5rem;
      padding: 3rem 2rem;
      color: #fff;
    }
    .cover-logo { font-size: 3.5rem; margin-bottom: 1rem; }
    .cover-subtitle {
      font-size: 0.95rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #d4a843;
      margin-bottom: 0.5rem;
    }
    .cover-title {
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      margin-bottom: 0.5rem;
    }
    .cover-stretch {
      font-size: 1.6rem;
      font-weight: 700;
      color: #9678c4;
      margin-bottom: 2.5rem;
    }
    .cover-chars {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.75rem;
      margin-bottom: 2.5rem;
      max-width: 480px;
    }
    .cover-char {
      width: 64px;
      height: 64px;
      object-fit: cover;
      border-radius: 50%;
      border: 3px solid #d4a843;
    }
    .cover-lands {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .cover-land-badge {
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .cover-meta {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
      margin-top: 1rem;
    }
    .cover-name-line {
      margin-top: 2rem;
      border-top: 2px solid rgba(255,255,255,0.2);
      padding-top: 1rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.7);
    }
    .cover-name-blank {
      display: inline-block;
      width: 200px;
      border-bottom: 2px solid #d4a843;
      margin-left: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="cover-page" epub:type="cover">
    <div class="cover-logo">🌟</div>
    <p class="cover-subtitle">Sound of Essentials • Rhythm Quest</p>
    <h1 class="cover-title">The Summer Stretch</h1>
    <p class="cover-stretch">8-Week Summer Workbook</p>

    <div class="cover-chars">
      <img class="cover-char" src="../images/characters/AMARA.jpg"   alt="Amara"/>
      <img class="cover-char" src="../images/characters/KWAME.jpg"   alt="Kwame"/>
      <img class="cover-char" src="../images/characters/SILAS.jpg"   alt="Silas"/>
      <img class="cover-char" src="../images/characters/VESTA.jpg"   alt="Vesta"/>
      <img class="cover-char" src="../images/characters/RONAN.jpg"   alt="Ronan"/>
      <img class="cover-char" src="../images/characters/SELENE.jpg"  alt="Selene"/>
      <img class="cover-char" src="../images/characters/NERISSA.jpg" alt="Nerissa"/>
      <img class="cover-char" src="../images/characters/OCTAVIA.jpg" alt="Octavia"/>
      <img class="cover-char" src="../images/characters/FELIX.jpg"   alt="Felix"/>
      <img class="cover-char" src="../images/characters/ATHENA.jpg"  alt="Athena"/>
      <img class="cover-char" src="../images/characters/ELIAS.jpg"   alt="Elias"/>
      <img class="cover-char" src="../images/characters/EZRA.jpg"    alt="Ezra"/>
    </div>

    <div class="cover-lands">
      <span class="cover-land-badge" style="background:#d4a843;color:#fff;">🎵 Harmonia</span>
      <span class="cover-land-badge" style="background:#7fb685;color:#fff;">🔢 Numeria</span>
      <span class="cover-land-badge" style="background:#10B981;color:#fff;">🌿 Terrasol</span>
      <span class="cover-land-badge" style="background:#2563EB;color:#fff;">🌊 Aquaria</span>
      <span class="cover-land-badge" style="background:#c4785a;color:#fff;">💪 Vitalis</span>
      <span class="cover-land-badge" style="background:#5ba4c9;color:#fff;">⚖️ Sophia</span>
      <span class="cover-land-badge" style="background:#9678c4;color:#fff;">✨ Celestia</span>
    </div>

    <p class="cover-meta">Grades K–3 · 15 Minutes Daily · Cross-Curricular · Bilingual Ready</p>
    <div class="cover-name-line">
      My name is: <span class="cover-name-blank"> </span>
    </div>
  </div>
</body>
</html>
