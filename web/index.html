  <!-- SPA redirect handler for GitHub Pages 404.html -->
  <script>
    (function () {
      var redirect = sessionStorage.redirect;
      delete sessionStorage.redirect;
      if (redirect && redirect !== location.href) {
        history.replaceState(null, null, redirect);
      }
      // Also handle ?/ query-string based redirects from 404.html
      var query = window.location.search;
      if (query.indexOf('?/') === 0) {
        var decoded = query.slice(2).split('&').map(function (s) { return s.replace(/~and~/g, '&'); }).join('?');
        window.history.replaceState(null, null,
          window.location.pathname + decoded + window.location.hash
        );
      }
    })();
  </script>
